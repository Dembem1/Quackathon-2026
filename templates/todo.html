{% extends "layout.html" %}

{% block title %}To-Do{% endblock %}

{% block navbar %}
    {% include "navbar.html" %}
{% endblock %}

{% block content %}
<h1>To-Do</h1>

<form method="POST">
    <input type="text" name="text" placeholder="Task" required>
    <button type="submit">Add</button>
</form>

<h3>Tasks</h3>
<ul>
    {% for t in data %}
        <li>{{ t.text }}</li>
    {% endfor %}
</ul>
{% endblock %}
