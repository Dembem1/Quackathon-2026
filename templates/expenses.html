{% extends "layout.html" %}

{% block title %}Expenses{% endblock %}

{% block navbar %}
    {% include "navbar.html" %}
{% endblock %}

{% block content %}
<h1>Expenses</h1>

<form method="POST">
    <input type="number" step="0.01" name="amount" placeholder="Amount" required>
    
    <select name="category">
        <option>Food</option>
        <option>Rent</option>
        <option>Transport</option>
        <option>Fun</option>
        <option>Other</option>
    </select>

    <button type="submit">Add</button>
</form>

<h3>All Expenses</h3>
<ul>
    {% for e in data %}
        <li>{{ e.amount }} - {{ e.category }} - {{ e.date }}</li>
    {% endfor %}
</ul>
{% endblock %}
