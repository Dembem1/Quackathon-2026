{% extends "layout.html" %}

{% block title %}Subscriptions{% endblock %}

{% block navbar %}
    {% include "navbar.html" %}
{% endblock %}

{% block content %}
<h1>Subscriptions</h1>

<form method="POST">
    <input type="text" name="name" placeholder="Name" required>
    <input type="number" step="0.01" name="cost" placeholder="Monthly cost" required>
    <button type="submit">Add</button>
</form>

<h3>All Subscriptions</h3>
<ul>
    {% for s in data %}
        <li>{{ s.name }} - {{ s.cost }}</li>
    {% endfor %}
</ul>
{% endblock %}
